
<style>
    #lib-wrap { display:flex; height:calc(100vh - 120px); min-height:500px; background:#1b2838; overflow:hidden; }

    /* ── Sidebar ── */
    .lib-sidebar { width:280px; min-width:240px; background:#171a21; border-right:1px solid #2a3f5f; display:flex; flex-direction:column; flex-shrink:0; }
    .lib-sidebar-header { padding:14px 14px 8px; border-bottom:1px solid #1e2a3a; }
    .lib-sidebar-title { font-size:11px; font-weight:700; color:#66c0f4; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .lib-sidebar-title::before { content:''; width:3px; height:12px; background:#66c0f4; border-radius:2px; display:inline-block; }
    .lib-count-badge { font-size:10px; font-weight:700; color:#171a21; background:#a3cf06; border-radius:10px; padding:1px 7px; margin-left:4px; }

    .lib-search-wrap { position:relative; }
    .lib-search-wrap i { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:#4a6a8a; font-size:11px; pointer-events:none; }
    .lib-search { width:100%; background:#1b2838; border:1px solid #2a3f5f; border-radius:6px; color:#c7d5e0; font-size:12px; padding:7px 10px 7px 28px; outline:none; box-sizing:border-box; transition:border-color .2s; }
    .lib-search:focus { border-color:#66c0f4; }

    .lib-filters { display:flex; gap:5px; padding:8px 14px 0; flex-wrap:wrap; }
    .lib-filter-btn { background:#1b2838; border:1px solid #2a3f5f; color:#8a9ab0; font-size:10px; font-weight:600; padding:3px 10px; border-radius:12px; cursor:pointer; transition:all .15s; text-transform:uppercase; }
    .lib-filter-btn:hover { border-color:#66c0f4; color:#66c0f4; }
    .lib-filter-btn.active { background:#66c0f4; border-color:#66c0f4; color:#171a21; }

    .lib-sort-row { display:flex; align-items:center; justify-content:space-between; padding:6px 14px; font-size:10px; color:#4a6a8a; border-bottom:1px solid #1e2a3a; }
    .lib-sort-row select { background:transparent; border:none; color:#66c0f4; font-size:10px; font-weight:600; cursor:pointer; outline:none; }
    .lib-sort-row select option { background:#1b2838; }

    .lib-game-list { flex:1; overflow-y:auto; padding:4px 0; }
    .lib-game-list::-webkit-scrollbar { width:4px; }
    .lib-game-list::-webkit-scrollbar-thumb { background:#2a3f5f; border-radius:2px; }

    /* Game card button */
    .lib-game-card { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; border:none; border-left:3px solid transparent; background:transparent; width:100%; text-align:left; transition:background .12s; }
    .lib-game-card:hover { background:#1e2a3a; }
    .lib-game-card.active { background:#1e2a3a; border-left-color:#66c0f4; }
    .lib-game-card.active .lib-game-name { color:#66c0f4; }
    .lib-game-thumb { width:42px; height:42px; border-radius:6px; object-fit:cover; flex-shrink:0; background:#2a3f5f; }
    .lib-game-info { flex:1; min-width:0; }
    .lib-game-name { font-size:12px; font-weight:700; color:#c7d5e0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lib-game-meta { display:flex; align-items:center; gap:5px; margin-top:3px; font-size:10px; color:#4a6a8a; }
    .lib-recent-badge { font-size:9px; font-weight:700; color:#a3cf06; background:rgba(163,207,6,.1); border:1px solid rgba(163,207,6,.2); border-radius:3px; padding:1px 4px; text-transform:uppercase; }
    .lib-game-status { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .lib-game-status.installed { background:#a3cf06; }
    .lib-game-status.not-installed { background:#4a6a8a; }
    .lib-game-status.updating { background:#fbbf24; }

    /* ── Main panel ── */
    .lib-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    .lib-empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:#4a6a8a; text-align:center; padding:40px; }
    .lib-empty-state i { font-size:44px; color:#2a3f5f; }
    .lib-empty-state h3 { font-size:15px; color:#8a9ab0; font-weight:600; }
    .lib-empty-state p { font-size:12px; max-width:260px; line-height:1.5; }

    .lib-detail { flex:1; display:flex; flex-direction:column; overflow:hidden; }

    /* Hero */
    .lib-hero { position:relative; height:200px; flex-shrink:0; overflow:hidden; }
    .lib-hero img { width:100%; height:100%; object-fit:cover; transition:transform .6s; }
    .lib-hero:hover img { transform:scale(1.03); }
    .lib-hero-overlay { position:absolute; inset:0; background:linear-gradient(to top, #1b2838 0%, rgba(27,40,56,.3) 60%, transparent 100%); }
    .lib-hero-info { position:absolute; bottom:0; left:0; right:0; padding:16px 24px; display:flex; align-items:flex-end; justify-content:space-between; gap:12px; }
    .lib-hero-title { font-size:22px; font-weight:800; color:#fff; line-height:1.1; }
    .lib-hero-tags { display:flex; gap:5px; margin-top:5px; flex-wrap:wrap; }
    .lib-hero-tag { font-size:9px; font-weight:700; color:#c7d5e0; background:rgba(23,26,33,.7); border:1px solid #2a3f5f; border-radius:3px; padding:2px 6px; text-transform:uppercase; }

    .lib-play-btn { background:#a3cf06; color:#171a21; border:none; font-size:12px; font-weight:800; padding:10px 24px; border-radius:6px; cursor:pointer; text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; gap:7px; flex-shrink:0; transition:all .15s; box-shadow:0 0 20px rgba(163,207,6,.3); }
    .lib-play-btn:hover { background:#b8e619; transform:translateY(-1px); box-shadow:0 0 28px rgba(163,207,6,.5); }

    /* Detail body */
    .lib-detail-body { flex:1; overflow-y:auto; padding:16px 24px; display:flex; flex-direction:column; gap:16px; }
    .lib-detail-body::-webkit-scrollbar { width:4px; }
    .lib-detail-body::-webkit-scrollbar-thumb { background:#2a3f5f; border-radius:2px; }

    .lib-stats-row { display:flex; background:#171a21; border:1px solid #2a3f5f; border-radius:8px; overflow:hidden; }
    .lib-stat { flex:1; padding:12px; border-right:1px solid #2a3f5f; text-align:center; }
    .lib-stat:last-child { border-right:none; }
    .lib-stat-value { font-size:17px; font-weight:800; color:#fff; }
    .lib-stat-value.blue { color:#66c0f4; } .lib-stat-value.gold { color:#fbbf24; } .lib-stat-value.green { color:#a3cf06; }
    .lib-stat-label { font-size:9px; color:#4a6a8a; text-transform:uppercase; letter-spacing:.8px; margin-top:3px; font-weight:600; }

    .lib-section-title { font-size:10px; font-weight:700; color:#4a6a8a; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
    .lib-section-title::after { content:''; flex:1; height:1px; background:#1e2a3a; }

    .lib-achievements { display:flex; gap:7px; flex-wrap:wrap; }
    .lib-achievement { display:flex; align-items:center; gap:5px; background:#171a21; border:1px solid #2a3f5f; border-radius:6px; padding:6px 10px; font-size:11px; color:#8a9ab0; }
    .lib-achievement.earned { border-color:#fbbf24; color:#fbbf24; background:rgba(251,191,36,.05); }

    .lib-actions { display:flex; gap:7px; flex-wrap:wrap; }
    .lib-action-btn { background:#1e2a3a; border:1px solid #2a3f5f; color:#c7d5e0; font-size:11px; font-weight:600; padding:7px 14px; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:5px; transition:all .15s; }
    .lib-action-btn:hover { border-color:#66c0f4; color:#66c0f4; background:rgba(102,192,244,.05); }

    .lib-scores { background:#171a21; border:1px solid #2a3f5f; border-radius:8px; overflow:hidden; }
    .lib-score-header, .lib-score-row { display:grid; grid-template-columns:32px 1fr 1fr 80px; padding:8px 12px; font-size:10px; }
    .lib-score-header { color:#4a6a8a; font-weight:700; text-transform:uppercase; letter-spacing:.8px; border-bottom:1px solid #1e2a3a; }
    .lib-score-row { color:#8a9ab0; border-bottom:1px solid #1a2332; align-items:center; transition:background .1s; }
    .lib-score-row:last-child { border-bottom:none; }
    .lib-score-row:hover { background:#1e2a3a; }
    .lib-score-row.you { color:#66c0f4; background:rgba(102,192,244,.04); }
    .lib-score-rank { font-weight:800; font-size:12px; color:#4a6a8a; }
    .lib-score-rank.gold { color:#fbbf24; } .lib-score-rank.silver { color:#94a3b8; } .lib-score-rank.bronze { color:#cd7c4a; }
    .lib-score-pts { font-weight:700; color:#a3cf06; text-align:right; }

    @media (max-width:768px) {
        #lib-wrap { flex-direction:column; height:auto; }
        .lib-sidebar { width:100%; max-height:260px; }
        .lib-hero { height:150px; }
    }
</style>

<div id="lib-wrap">

    <!-- LEFT: Sidebar -->
    <aside class="lib-sidebar">
        <div class="lib-sidebar-header">
            <div class="lib-sidebar-title">Library <span class="lib-count-badge" id="lib-count">6</span></div>
            <div class="lib-search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input class="lib-search" id="lib-search" type="text" placeholder="Search your games…" oninput="renderLibList()">
            </div>
        </div>
        <div class="lib-filters">
            <button class="lib-filter-btn active" onclick="setLibFilter('all',this)">All</button>
            <button class="lib-filter-btn" onclick="setLibFilter('installed',this)">Installed</button>
            <button class="lib-filter-btn" onclick="setLibFilter('recent',this)">Recent</button>
        </div>
        <div class="lib-sort-row">
            <span>Sort by</span>
            <select id="lib-sort" onchange="renderLibList()">
                <option value="recent">Recent</option>
                <option value="alpha">A – Z</option>
                <option value="playtime">Playtime</option>
            </select>
        </div>
        <div class="lib-game-list" id="lib-game-list"></div>
    </aside>

    <!-- RIGHT: Detail -->
    <main class="lib-main">
        <div class="lib-empty-state" id="lib-empty">
            <i class="fa-solid fa-gamepad"></i>
            <h3>Select a game</h3>
            <p>Pick a title from your library to see stats and jump back in.</p>
        </div>
        <div class="lib-detail" id="lib-detail" style="display:none;">
            <div class="lib-hero">
                <img id="lib-hero-img" src="" alt="">
                <div class="lib-hero-overlay"></div>
                <div class="lib-hero-info">
                    <div>
                        <div class="lib-hero-title" id="lib-hero-title"></div>
                        <div class="lib-hero-tags" id="lib-hero-tags"></div>
                    </div>
                    <button class="lib-play-btn" id="lib-play-btn" onclick="launchGame()">
                        <i class="fa-solid fa-play"></i> Play
                    </button>
                </div>
            </div>
            <div class="lib-detail-body">
                <div class="lib-stats-row">
                    <div class="lib-stat"><div class="lib-stat-value blue" id="ls-time">—</div><div class="lib-stat-label">Hours Played</div></div>
                    <div class="lib-stat"><div class="lib-stat-value gold" id="ls-ach">—</div><div class="lib-stat-label">Achievements</div></div>
                    <div class="lib-stat"><div class="lib-stat-value green" id="ls-score">—</div><div class="lib-stat-label">Top Score</div></div>
                    <div class="lib-stat"><div class="lib-stat-value" id="ls-last">—</div><div class="lib-stat-label">Last Played</div></div>
                </div>
                <div>
                    <div class="lib-section-title">Achievements</div>
                    <div class="lib-achievements" id="lib-ach"></div>
                </div>
                <div>
                    <div class="lib-section-title">Quick Actions</div>
                    <div class="lib-actions">
                        <button class="lib-action-btn"><i class="fa-solid fa-cloud-arrow-up"></i> Cloud Save</button>
                        <button class="lib-action-btn"><i class="fa-solid fa-users"></i> Invite Friends</button>
                        <button class="lib-action-btn"><i class="fa-solid fa-star"></i> Rate Game</button>
                        <button class="lib-action-btn"><i class="fa-solid fa-ellipsis"></i> More</button>
                    </div>
                </div>
                <div>
                    <div class="lib-section-title">High Score Board</div>
                    <div class="lib-scores">
                        <div class="lib-score-header"><span>#</span><span>Player</span><span>Date</span><span style="text-align:right">Score</span></div>
                        <div id="lib-score-rows"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const LIB_GAMES = [
        { id:1, name:"Cyberstrike: Neo Tokyo", genre:"Action", tags:["Action","Tactical Mech","Indie"],
          thumb:"https://images.unsplash.com/photo-1542751371-adc38448a05e?w=120&auto=format&fit=crop&q=80",
          hero:"https://images.unsplash.com/photo-1542751371-adc38448a05e?w=900&auto=format&fit=crop&q=80",
          playtime:"42.5", achievements:"8/20", topScore:"128,440", lastPlayed:"Today", status:"installed", recent:true,
          achList:[{n:"First Blood",e:true},{n:"Mech Pilot",e:true},{n:"Neo Legend",e:false},{n:"Speed Run",e:true}],
          scores:[{r:1,p:"ViperX",d:"Jun 25",s:"198,230"},{r:2,p:"CNS_gamer_90",d:"Jun 26",s:"128,440",you:true},{r:3,p:"StrikeZ",d:"Jun 20",s:"97,110"},{r:4,p:"Null_Runner",d:"Jun 18",s:"85,300"}]},
        { id:2, name:"Void Wanderer", genre:"RPG", tags:["RPG","Open World"],
          thumb:"https://images.unsplash.com/photo-1462275646964-a0e3386b89fa?w=120&auto=format&fit=crop&q=80",
          hero:"https://images.unsplash.com/photo-1462275646964-a0e3386b89fa?w=900&auto=format&fit=crop&q=80",
          playtime:"113.2", achievements:"34/60", topScore:"502,000", lastPlayed:"3 days ago", status:"installed", recent:true,
          achList:[{n:"Starborn",e:true},{n:"Void Walker",e:true},{n:"Galaxy Map",e:true},{n:"Ascendant",e:false}],
          scores:[{r:1,p:"AstroQueen",d:"Jun 22",s:"800,100"},{r:2,p:"NebulaX",d:"Jun 21",s:"710,500"},{r:3,p:"CNS_gamer_90",d:"Jun 23",s:"502,000",you:true},{r:4,p:"StarDrifter",d:"Jun 19",s:"430,200"}]},
       
    ];

    let libFilter = 'all', activeId = null;
    const RC = ['gold','silver','bronze'];

    function renderLibList() {
        const q = (document.getElementById('lib-search').value||'').toLowerCase();
        const sort = document.getElementById('lib-sort').value;
        let games = LIB_GAMES.filter(g => {
            const match = g.name.toLowerCase().includes(q) || g.genre.toLowerCase().includes(q);
            if (!match) return false;
            if (libFilter==='installed') return g.status==='installed';
            if (libFilter==='recent') return g.recent;
            return true;
        });
        if (sort==='alpha') games.sort((a,b)=>a.name.localeCompare(b.name));
        else if (sort==='playtime') games.sort((a,b)=>parseFloat(b.playtime)-parseFloat(a.playtime));
        else games.sort((a,b)=>(b.recent?1:0)-(a.recent?1:0));
        document.getElementById('lib-count').textContent = games.length;
        document.getElementById('lib-game-list').innerHTML = games.map(g=>`
            <button class="lib-game-card ${activeId===g.id?'active':''}" onclick="selectGame(${g.id})">
                <img class="lib-game-thumb" src="${g.thumb}" alt="${g.name}">
                <div class="lib-game-info">
                    <div class="lib-game-name">${g.name}</div>
                    <div class="lib-game-meta">
                        <span>${g.genre}</span><span>·</span><span>${g.playtime}h</span>
                        ${g.recent?'<span class="lib-recent-badge">Recent</span>':''}
                    </div>
                </div>
                <span class="lib-game-status ${g.status}"></span>
            </button>`).join('');
    }

    function selectGame(id) {
        activeId = id;
        const g = LIB_GAMES.find(x=>x.id===id);
        renderLibList();
        document.getElementById('lib-hero-img').src = g.hero;
        document.getElementById('lib-hero-title').textContent = g.name;
        document.getElementById('lib-hero-tags').innerHTML = g.tags.map(t=>`<span class="lib-hero-tag">${t}</span>`).join('');
        const btn = document.getElementById('lib-play-btn');
        if (g.status==='not-installed') { btn.innerHTML='<i class="fa-solid fa-download"></i> Install'; btn.style.cssText='background:#2a3f5f;color:#66c0f4;box-shadow:none;'; }
        else if (g.status==='updating')  { btn.innerHTML='<i class="fa-solid fa-rotate"></i> Updating…'; btn.style.cssText='background:#fbbf24;color:#171a21;'; }
        else                             { btn.innerHTML='<i class="fa-solid fa-play"></i> Play'; btn.style.cssText='background:#a3cf06;color:#171a21;box-shadow:0 0 20px rgba(163,207,6,.3);'; }
        document.getElementById('ls-time').textContent  = g.playtime;
        document.getElementById('ls-ach').textContent   = g.achievements;
        document.getElementById('ls-score').textContent = g.topScore;
        document.getElementById('ls-last').textContent  = g.lastPlayed;
        document.getElementById('lib-ach').innerHTML = g.achList.map(a=>`
            <div class="lib-achievement ${a.e?'earned':''}"><i class="fa-solid ${a.e?'fa-trophy':'fa-lock'}"></i>${a.n}</div>`).join('');
        document.getElementById('lib-score-rows').innerHTML = g.scores.map(s=>`
            <div class="lib-score-row ${s.you?'you':''}">
                <span class="lib-score-rank ${RC[s.r-1]||''}">${s.r}</span>
                <span>${s.p}${s.you?' <span style="font-size:9px;color:#4a6a8a">(you)</span>':''}</span>
                <span>${s.d}</span><span class="lib-score-pts">${s.s}</span>
            </div>`).join('');
        document.getElementById('lib-empty').style.display  = 'none';
        document.getElementById('lib-detail').style.display = 'flex';
    }

    function setLibFilter(f, btn) {
        libFilter = f;
        document.querySelectorAll('.lib-filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderLibList();
    }

    function launchGame() {
        const g = LIB_GAMES.find(x=>x.id===activeId);
        if (!g) return;
        if (g.status==='not-installed') alert(`Installing ${g.name}…`);
        else if (g.status==='updating')  alert(`${g.name} is updating. Please wait.`);
        else                             alert(`Launching ${g.name}…`);
    }

    renderLibList();
</script>
