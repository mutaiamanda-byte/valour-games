<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPOR Platform</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="stylesheet" type="text/css" href="styles.store.css">
</head>
<body>

    <div class="top-bar">
        <div class="logo">
             VAPOR
            <small>Platform Edition</small>
        </div>

        <div class="menu" id="mainMenu">
            <button class="active" data-tab="store">Store</button>
            <button data-tab="library">Library <span class="badge" id="libraryBadge">1</span></button>
            <button data-tab="social">Social</button>
            <button data-tab="studio">Studio</button>
        </div>

        <div class="right">
            <button class="cart-btn" id="cartBtn" onclick="openCart()">
                <span class="cart-count" id="cartCount">2</span>
            </button>

            <div class="avatar"></div>

            <span class="username">DevGamer_90</span>

            <span class="wallet"> $150.00</span>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <span>
                <span class="status-dot"></span> 
                Client Online
            </span>
            <span>
                 26M Active Gamers
            </span>
        </div>
        <div class="status-right">
            <span class="sandbox-mode"> Local Sandbox</span>
            <span class="admin-mode"> Admin Mode</span>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        </div>

    <div class="modal-overlay" id="cartModal">
        <div class="modal">
            <h3> Your Cart</h3>
            <p>You have <strong id="modalCartCount">2</strong> items in your cart.</p>
            <p style="font-size: 14px; color: #66c0f4;">Total: $49.98</p>
            <button class="modal-close" onclick="closeCart()">Close</button>
        </div>
    </div>

    <script>
        // Global Cart Count Variable
        let cartCount = 2;

        // ===== GAME DATA =====
        const games = [
            {
                id: 1,
                title: "Cyberstrike: Neo Tokyo",
                category: "action",
                price: 29.99,
                originalPrice: 59.99,
                image: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: 2,
                title: "Dragon's Legacy",
                category: "rpg",
                price: 39.99,
                originalPrice: null,
                image: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: 3,
                title: "Mystic Realms",
                category: "adventure",
                price: 24.99,
                originalPrice: null,
                image: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: 4,
                title: "Pixel Warriors",
                category: "indie",
                price: 14.99,
                originalPrice: null,
                image: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: 5,
                title: "Space Odyssey",
                category: "action",
                price: 49.99,
                originalPrice: null,
                image: "https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: 6,
                title: "Forgotten Kingdom",
                category: "rpg",
                price: 34.99,
                originalPrice: 49.99,
                image: "https://images.unsplash.com/photo-1580234811497-9df7fd2f3572?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: 7,
                title: "Neon Drift",
                category: "indie",
                price: 19.99,
                originalPrice: null,
                image: "https://images.unsplash.com/photo-1511882150382-421056c89033?w=400&auto=format&fit=crop&q=80"
            },
            {
                id: 8,
                title: "Shadow Stalker",
                category: "action",
                price: 44.99,
                originalPrice: 59.99,
                image: "https://images.unsplash.com/photo-1560253023-3ec5d502959f?w=400&auto=format&fit=crop&q=80"
            }
        ];

        let currentFilter = 'all';

        // --- Tab Switching ---
        const menuButtons = document.querySelectorAll('.menu button');
        const mainContent = document.getElementById('mainContent');
        const libraryBadge = document.getElementById('libraryBadge');

        menuButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from all buttons
                menuButtons.forEach(btn => btn.classList.remove('active'));
                
                // Add active class to clicked button
                this.classList.add('active');

                // Update content based on tab
                const tab = this.dataset.tab;
                switchTabContent(tab);
            });
        });

        function switchTabContent(tab) {
            if (tab === 'store') {
                // Insert the full Store layout code inside mainContent
                mainContent.innerHTML = `
                    <div class="store-container">
                        <div class="store-header">
                            <h1>
                                🎮 Store
                                <small>Discover your next adventure</small>
                            </h1>
                        </div>

                        <div class="featured-game">
                            <div class="featured-game-image">
                                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800&auto=format&fit=crop&q=80" alt="Featured Game">
                            </div>
                            <div class="featured-game-info">
                                <div>
                                    <span class="featured-badge">🔥 Featured</span>
                                    <h2>Cyberstrike: Neo Tokyo</h2>
                                    <p>Command heavy tactical mechs in the neon shadows of a corporate dystopian warzone.</p>
                                    <div class="game-tags">
                                        <span>Action</span>
                                        <span>Tactical Mech</span>
                                        <span>Indie</span>
                                    </div>
                                </div>
                                <div class="featured-game-footer">
                                    <div class="price">
                                        <span class="original">$59.99</span>
                                        <span class="current">$29.99</span>
                                        <span class="discount">-50%</span>
                                    </div>
                                    <button class="btn-add-cart" onclick="addToCart('Cyberstrike: Neo Tokyo')">
                                        🛒 Add to Cart
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="filter-bar">
                            <div class="filter-buttons">
                                <button class="${currentFilter === 'all' ? 'active' : ''}" data-filter="all" onclick="filterGames('all')">All</button>
                                <button class="${currentFilter === 'action' ? 'active' : ''}" data-filter="action" onclick="filterGames('action')">Action</button>
                                <button class="${currentFilter === 'rpg' ? 'active' : ''}" data-filter="rpg" onclick="filterGames('rpg')">RPG</button>
                                <button class="${currentFilter === 'adventure' ? 'active' : ''}" data-filter="adventure" onclick="filterGames('adventure')">Adventure</button>
                                <button class="${currentFilter === 'indie' ? 'active' : ''}" data-filter="indie" onclick="filterGames('indie')">Indie</button>
                            </div>
                            <div class="search-box">
                                <span class="icon">🔍</span>
                                <input type="text" id="searchInput" placeholder="Search games..." onkeyup="filterGames()">
                            </div>
                        </div>

                        <div class="game-grid" id="gameGrid">
                            </div>

                        <div class="no-results" id="noResults">
                            <p>😕 No games found matching your criteria.</p>
                        </div>
                    </div>
                `;
                // Render the game lists immediately inside the newly created elements
                renderGames(currentFilter, document.getElementById('searchInput')?.value || '');
            } else {
                const contentTitles = {
                    library: '📚 Your Library',
                    social: '👥 Social & Friends',
                    studio: '💻 Studio Dashboard'
                };

                const contentDescriptions = {
                    library: 'Your game collection. You have 12 games.',
                    social: 'Connect with friends and chat.',
                    studio: 'Create and manage your game projects.'
                };

                mainContent.innerHTML = `
                    <h2>${contentTitles[tab] || 'Welcome'}</h2>
                    <p>${contentDescriptions[tab] || 'Select a tab above.'}</p>
                    ${tab === 'library' ? '<p style="margin-top:12px;font-size:13px;color:#a3cf06;">🎮 <strong>12</strong> games in your library</p>' : ''}
                    ${tab === 'social' ? '<p style="margin-top:12px;font-size:13px;color:#66c0f4;">👤 8 friends online</p>' : ''}
                    ${tab === 'studio' ? '<p style="margin-top:12px;font-size:13px;color:#fbbf24;">⚡ 3 projects in development</p>' : ''}
                `;
            }

            // Sync badges based on selected tabs
            if (tab === 'library') {
                libraryBadge.textContent = '12';
            } else {
                libraryBadge.textContent = '1';
            }
        }

        // ===== RENDER GAMES =====
        function renderGames(filter = 'all', search = '') {
            const grid = document.getElementById('gameGrid');
            const noResults = document.getElementById('noResults');
            if (!grid || !noResults) return; // Guard clause in case elements aren't rendered yet
            
            let filtered = games;

            // Filter by category
            if (filter !== 'all') {
                filtered = filtered.filter(game => game.category === filter);
            }

            // Filter by search
            if (search.trim()) {
                const query = search.toLowerCase().trim();
                filtered = filtered.filter(game => 
                    game.title.toLowerCase().includes(query) ||
                    game.category.toLowerCase().includes(query)
                );
            }

            // Show/hide no results
            if (filtered.length === 0) {
                noResults.classList.add('show');
                grid.innerHTML = '';
                return;
            } else {
                noResults.classList.remove('show');
            }

            // Render games list
            grid.innerHTML = filtered.map(game => `
                <div class="game-card">
                    <div class="game-card-image">
                        <img src="${game.image}" alt="${game.title}" loading="lazy">
                    </div>
                    <div class="game-card-body">
                        <h4>${game.title}</h4>
                        <div class="category">${game.category}</div>
                        <div class="card-price">
                            <span>
                                $${game.price.toFixed(2)}
                                ${game.originalPrice ? `<span style="font-size:11px;color:#5a606b;text-decoration:line-through;font-weight:400;"> $${game.originalPrice.toFixed(2)}</span>` : ''}
                            </span>
                            <button onclick="addToCart('${game.title.replace(/'/g, "\\'")}')">+ Add</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== FILTER GAMES =====
        function filterGames(category) {
            const searchInput = document.getElementById('searchInput');
            const search = searchInput ? searchInput.value : '';
            
            if (category) {
                currentFilter = category;
                // Update active buttons in the store DOM
                document.querySelectorAll('.filter-buttons button').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.filter === category) {
                        btn.classList.add('active');
                    }
                });
            }

            renderGames(currentFilter, search);
        }

        // ===== ADD TO CART =====
        function addToCart(gameTitle) {
            alert(`✅ "${gameTitle}" added to your cart!`);
            cartCount++;
            
            // Sync with global header cart badge display
            const cartCountBadge = document.getElementById('cartCount');
            cartCountBadge.textContent = cartCount;
            if (cartCount > 0) {
                cartCountBadge.classList.add('show');
            }
        }

        // --- Cart Modal Toggles ---
        function openCart() {
            document.getElementById('cartModal').classList.add('show');
            document.getElementById('modalCartCount').textContent = cartCount;
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('remove');
            document.getElementById('cartModal').classList.remove('show');
        }

        // Close on overlay clicking
        document.getElementById('cartModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCart();
            }
        });

        // Double click cart button cheat to add a fast layout item
        document.getElementById('cartBtn').addEventListener('dblclick', function() {
            cartCount++;
            document.getElementById('cartCount').textContent = cartCount;
            document.getElementById('cartCount').classList.add('show');
        });

        // Close via Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeCart();
            }
        });

        // ===== INITIALIZE APP WINDOW =====
        // Boot up directly into the store tab structure layout
        switchTabContent('store');

        if (cartCount > 0) {
            document.getElementById('cartCount').classList.add('show');
        }

        console.log(' VAPOR Platform loaded successfully!');
        console.log(' Double-click the cart icon to add items!');
    </script>
</body>
</html>
