<section id="tab-store" class="space-y-8 animate-fadeIn">
    
    <div class="relative bg-gradient-to-br from-indigo-950 via-slate-900 to-purple-950 rounded-2xl overflow-hidden min-h-[360px] flex flex-col md:flex-row border border-purple-500/20 shadow-[0_0_30px_rgba(168,85,247,0.15)] transition-all duration-300 hover:border-purple-500/40">
        <div class="md:w-3/5 relative overflow-hidden group">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800&auto=format&fit=crop&q=80" alt="Cyberstrike" class="w-full h-full object-cover transition duration-700 group-hover:scale-105">
            <div class="absolute inset-0 bg-gradient-to-t md:bg-gradient-to-r from-slate-950 via-slate-950/50 to-transparent"></div>
        </div>
        <div class="md:w-2/5 p-8 flex flex-col justify-between z-10 bg-gradient-to-t md:bg-none from-slate-950 md:from-transparent">
            <div>
                <span class="bg-purple-500/20 text-purple-300 border border-purple-500/30 text-[10px] px-3 py-1 rounded-full font-black uppercase tracking-widest animate-pulse">
                    <i class="fa-solid fa-fire mr-1 text-purple-400"></i>FEATURED RECRUIT
                </span>
                <h2 class="text-3xl font-black text-white mt-4 tracking-tight drop-shadow-md">Cyberstrike: Neo Tokyo</h2>
                <p class="text-xs text-slate-300/90 mt-3 leading-relaxed">Command heavy tactical mechs in the neon shadows of a corporate dystopian warzone. Connect with friends, unlock trophies, and synchronize scores with SQL databases.</p>
                <div class="flex flex-wrap gap-2 mt-4">
                    <span class="bg-purple-900/40 text-[9px] font-bold px-2.5 py-1 rounded-md text-purple-300 border border-purple-500/20">Action</span>
                    <span class="bg-purple-900/40 text-[9px] font-bold px-2.5 py-1 rounded-md text-purple-300 border border-purple-500/20">Tactical Mech</span>
                    <span class="bg-purple-900/40 text-[9px] font-bold px-2.5 py-1 rounded-md text-purple-300 border border-purple-500/20">Indie Showcase</span>
                </div>
            </div>
            <div class="mt-6 flex items-center justify-between gap-4 border-t border-purple-500/10 pt-4">
                <div>
                    <span class="text-xs text-slate-500 line-through block">$59.99</span>
                    <span class="text-xl font-black text-white">$29.99 <span class="bg-purple-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md ml-1.5 shadow-md animate-bounce">-50%</span></span>
                </div>
                <button onclick="addToCart(1)" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-black px-6 py-3 rounded-xl text-xs tracking-wider uppercase transition shadow-[0_4px_20px_rgba(168,85,247,0.4)] transform active:scale-95 flex items-center gap-2">
                    <i class="fa-solid fa-cart-plus text-sm"></i> Add to Cart
                </button>
            </div>
        </div>
    </div>

    <div class="bg-gradient-to-r from-slate-950 to-indigo-950/40 p-4 rounded-xl border border-purple-900/20 flex flex-col md:flex-row justify-between items-center gap-4 shadow-xl">
        <div class="flex flex-wrap items-center gap-2 w-full md:w-auto">
            <button onclick="filterCategory('All')" class="cat-btn px-4 py-2.5 rounded-xl text-xs font-extrabold bg-purple-600 text-white shadow-[0_2px_10px_rgba(168,85,247,0.3)] transition-all">All Games</button>
            <button onclick="filterCategory('Action')" class="cat-btn px-4 py-2.5 rounded-xl text-xs font-bold bg-slate-900 text-slate-300 border border-purple-500/10 hover:bg-purple-950/40 hover:text-white hover:border-purple-500/30 transition-all">Action</button>
            <button onclick="filterCategory('RPG')" class="cat-btn px-4 py-2.5 rounded-xl text-xs font-bold bg-slate-900 text-slate-300 border border-purple-500/10 hover:bg-purple-950/40 hover:text-white hover:border-purple-500/30 transition-all">RPG</button>
            <button onclick="filterCategory('Adventure')" class="cat-btn px-4 py-2.5 rounded-xl text-xs font-bold bg-slate-900 text-slate-300 border border-purple-500/10 hover:bg-purple-950/40 hover:text-white hover:border-purple-500/30 transition-all">Adventure</button>
            <button onclick="filterCategory('Indie')" class="cat-btn px-4 py-2.5 rounded-xl text-xs font-bold bg-slate-900 text-slate-300 border border-purple-500/10 hover:bg-purple-950/40 hover:text-white hover:border-purple-500/30 transition-all">Indie</button>
        </div>
        
        <div class="relative w-full md:w-80">
            <input type="text" id="store-search-bar" onkeyup="renderStoreCatalog()" placeholder="Search catalog directory..." class="w-full bg-slate-950 text-white text-xs pl-10 pr-4 py-3 rounded-xl border border-purple-900/30 focus:outline-none focus:border-purple-500 focus:shadow-[0_0_15px_rgba(168,85,247,0.2)] transition-all">
            <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-4 text-purple-400 text-xs"></i>
        </div>
    </div>

    <div>
        <h3 class="text-xs font-black text-white uppercase tracking-widest mb-5 flex items-center gap-2">
            <span class="w-2 h-4 bg-purple-500 rounded-full shadow-[0_0_8px_#a855f7]"></span> Arcade Showroom Catalog
        </h3>
        <div id="store-games-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </div>

</section>
