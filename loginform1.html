<html>
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Login - VAPOR Platform</title>
 </head>
 <body>
  <style>
    /* ====== LOGIN FORM ====== */
.body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #070c14;
    color: #c7d5e0;
}
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 20px;
    background: linear-gradient(135deg, #071d38 0%, #0d141f 100%);
}

.login-box {
    background: #171a21;
    border-radius: 16px;
    padding: 40px;
    max-width: 420px;
    width: 100%;
    border: 1px solid #2a475e;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
}

.login-header {
    text-align: center;
    margin-bottom: 30px;
}

.login-header h2 {
    color: #66c0f4;
    font-size: 32px;
    margin-bottom: 8px;
}

.login-header p {
    color: #8a8f9a;
    font-size: 14px;
}

.form-group {
    margin-bottom: 20px;
    position: relative;
}

.form-group label {
    display: block;
    color: #c7d5e0;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
}

.form-group input {
    width: 100%;
    padding: 12px 16px;
    background: #1b2838;
    border: 1px solid #2a475e;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    transition: all 0.3s ease;
    box-sizing: border-box;
}

.form-group input:focus {
    outline: none;
    border-color: #66c0f4;
    box-shadow: 0 0 0 3px rgba(102, 192, 244, 0.1);
}

.form-group input::placeholder {
    color: #5a606b;
}

.toggle-password {
    position: absolute;
    right: 12px;
    bottom: 12px;
    cursor: pointer;
    color: #5a606b;
    font-size: 18px;
}

.toggle-password:hover {
    color: #c7d5e0;
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    font-size: 13px;
}

.remember-me {
    color: #8a8f9a;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}

.remember-me input[type="checkbox"] {
    accent-color: #66c0f4;
    width: 16px;
    height: 16px;
    cursor: pointer;
}

.forgot-password {
    color: #66c0f4;
    text-decoration: none;
    font-size: 13px;
}

.forgot-password:hover {
    text-decoration: underline;
}

.login-btn {
    width: 100%;
    padding: 14px;
    background: #66c0f4;
    color: #171a21;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.login-btn:hover {
    background: #7fcff7;
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102, 192, 244, 0.3);
}

.login-btn:active {
    transform: translateY(0);
}

.register-link {
    text-align: center;
    margin-top: 20px;
    color: #8a8f9a;
    font-size: 14px;
}

.register-link a {
    color: #66c0f4;
    text-decoration: none;
    font-weight: 600;
}

.register-link a:hover {
    text-decoration: underline;
}

.social-login {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid #2a2a2a;
}

.social-login p {
    color: #8a8f9a;
    font-size: 13px;
    text-align: center;
    margin-bottom: 12px;
}

.social-icons {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.social-btn {
    padding: 8px 20px;
    background: #1b2838;
    border: 1px solid #2a475e;
    border-radius: 8px;
    color: #c7d5e0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.social-btn:hover {
    background: #2a475e;
    border-color: #66c0f4;
    color: white;
}
  </style>


<!-- ====== LOGIN FORM ====== -->
<div class="login-container" id="loginContainer">
    <div class="login-box">
        <div class="login-header">
            <h2>🎮 VAPOR</h2>
            <p>Sign in to your account</p>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <span class="toggle-password" onclick="togglePassword()">👁️</span>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" checked> Remember me
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="login-btn">SIGN IN</button>
            
            <div class="register-link">
                Don't have an account? <a href="#">Create one</a>
            </div>
        </form>
        
        <div class="social-login">
            <p>Or continue with</p>
            <div class="social-icons">
                <button class="social-btn">Google</button>
                <button class="social-btn">Steam</button>
                <button class="social-btn">Discord</button>
            </div>
        </div>
    </div>
</div>
 </body>
</html>
